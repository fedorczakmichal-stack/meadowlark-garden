# Sync the preview branch into main/preview/ so GitHub Pages (served from main)
# exposes a live dev channel without changing the Pages source.
name: Sync preview

on:
  push:
    branches: [preview]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout preview
        uses: actions/checkout@v4
        with:
          ref: preview
          path: src

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync into main/preview/
        run: |
          mkdir -p main/preview
          if [ -f main/preview/index.html ]; then cp main/preview/index.html /tmp/preview-hub.html; fi
          find main/preview -mindepth 1 ! -name index.html -exec rm -rf {} + 2>/dev/null || true
          rsync -a \
            --exclude .git --exclude preview \
            src/ main/preview/
          if [ -f /tmp/preview-hub.html ]; then cp /tmp/preview-hub.html main/preview/index.html; fi

      - name: Commit to main
        run: |
          cd main
          git add preview/
          git diff --staged --quiet && echo "No changes" && exit 0
          git -c user.name='github-actions[bot]' -c user.email='github-actions[bot]@users.noreply.github.com' \
            commit -m "Sync preview branch into preview/ [skip ci]"
          git push
