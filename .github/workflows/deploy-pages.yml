# Push na preview lub cursor/* → zastępuje zawartość /preview/ na main (jeden adres podglądu).
name: Sync preview

on:
  push:
    branches:
      - preview
      - 'cursor/**'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          path: src

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace preview (garden → preview/)
        run: |
          mkdir -p main/preview
          rsync -a --delete \
            --exclude README.md \
            src/garden/ main/preview/

      - name: Commit to main
        run: |
          cd main
          git add preview/
          git diff --staged --quiet && echo "No changes" && exit 0
          git -c user.name='github-actions[bot]' -c user.email='github-actions[bot]@users.noreply.github.com' \
            commit -m "Update preview from ${GITHUB_REF_NAME} [skip ci]"
          git push
